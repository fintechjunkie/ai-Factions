<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>AI Factions: The Simulation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#07090F;min-height:100%}
body{font-family:Georgia,Cambria,serif;color:#E6DDD0;overflow-y:auto}
#root{min-height:100vh}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes dot{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
@keyframes barGrow{from{width:0}to{width:var(--tw)}}
.fade{animation:fadeIn .4s ease forwards}
.bar-anim{animation:barGrow .9s cubic-bezier(.4,0,.2,1) forwards}
textarea{background:#111820;border:1px solid #1A2535;border-radius:8px;color:#E6DDD0;font-family:Georgia,Cambria,serif;font-size:14px;line-height:1.75;padding:12px 14px;resize:vertical;width:100%;outline:none;display:block;min-height:90px}
textarea:focus{border-color:#C9A84C66}
textarea::placeholder{color:#4A5570}
button{cursor:pointer;font-family:Consolas,monospace}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#1A2535;border-radius:2px}
</style>
</head>
<body><div id="root"></div>
<script>
const {useState,useEffect,useRef,createElement:h}=React;
const BG="#07090F",CARD="#111820",RAISED="#161E2C",BORDER="#1A2535";
const TEXT="#E6DDD0",BODY="#9A9080",MUTED="#4A5570";
const GOLD="#C9A84C",GRN="#4ADE80",TEAL="#14B8A6",RED="#F87171",AMB="#FBBF24",BLU="#60A5FA";
const SF="Georgia,Cambria,serif",MO="Consolas,monospace";

// ── BASELINE SCORES (1-100, March 2026) ──────────────────────────────────────
const BASE={
  billionaire:95,investor:76,tech_entrepreneur:79,tech_worker:71,
  knowledge_worker:67,creative:44,tradesperson:62,service_worker:31,
  middle_manager:58,gig_worker:34,small_business:53,near_retirement:56,
  young_worker:41,union_public:63
};

// ── GROUPS ───────────────────────────────────────────────────────────────────
const GROUPS=[
  {id:"billionaire",      name:"Billionaires & Ultra-Wealthy",    desc:"Income from capital, insulated from automation",        color:AMB},
  {id:"investor",         name:"Capital Investors",                desc:"Savings, 401k, equities — growing capital base",        color:AMB},
  {id:"tech_entrepreneur",name:"Tech Entrepreneurs",               desc:"Building companies in the AI era",                      color:GRN},
  {id:"tech_worker",      name:"Tech Knowledge Workers",           desc:"Engineers, data scientists, product managers",          color:BLU},
  {id:"knowledge_worker", name:"Professional Knowledge Workers",   desc:"Lawyers, consultants, analysts, doctors",               color:"#8B5CF6"},
  {id:"creative",         name:"Creative Professionals",           desc:"Writers, artists, musicians, photographers",            color:"#EC4899"},
  {id:"tradesperson",     name:"Skilled Tradespeople",             desc:"Electricians, plumbers, HVAC, mechanics",               color:"#34D399"},
  {id:"service_worker",   name:"Service & Unskilled Labor",        desc:"Retail, food service, warehouse, call centers",        color:RED},
  {id:"middle_manager",   name:"White Collar Middle Managers",     desc:"Office coordinators, HR, operations",                   color:"#F87171"},
  {id:"gig_worker",       name:"Gig & Platform Workers",           desc:"Rideshare, delivery, freelance platforms",              color:"#F87171"},
  {id:"small_business",   name:"Small Business Owners",            desc:"Local restaurants, shops, service contractors",        color:"#F97316"},
  {id:"near_retirement",  name:"Near-Retirement Workers (55-65)",  desc:"Too young to stop, hardest to reskill",                 color:"#FB923C"},
  {id:"young_worker",     name:"Young Workers & New Entrants",     desc:"Ages 18-30, entering a transformed workforce",         color:"#FCA5A5"},
  {id:"union_public",     name:"Union & Public Sector",            desc:"Protected by contracts and civil service rules",       color:GRN},
];

// ── EVENTS (9) ───────────────────────────────────────────────────────────────
const EVENTS=[
  {id:"jobs",icon:"💼",title:"The Jobs Question",
   body:["AI agents are doing work humans used to do — reviewing contracts, writing reports, answering calls, writing code. The disruption is accelerating. The open question is whether it becomes visible enough to matter politically.",
         "There is a massive difference between quiet erosion — companies stop hiring, headcount slowly falls — and a public reckoning where layoffs make the front page and workers can name exactly what replaced them."],
   choiceQ:"How severe does the displacement become by 2027?",
   choices:[{v:"minimal",label:"Minimal",desc:"Quiet hiring slowdown, little public drama"},
            {v:"moderate",label:"Moderate",desc:"Visible disruption across multiple sectors"},
            {v:"severe",label:"Severe",desc:"High-profile layoffs, AI named as the cause"},
            {v:"catastrophic",label:"Catastrophic",desc:"Structural unemployment, a full political crisis"}],
   textQ:"Which industries are hardest hit? What does it look and feel like?"},

  {id:"agi",icon:"🧠",title:"The AGI Question",
   body:["Every major AI lab says they are months from artificial general intelligence — AI that can do any cognitive task a human can do. The timelines have been wrong before. But the capabilities keep growing.",
         "If AGI arrives in this window, it changes everything: the scale of disruption, the urgency of regulation, the dynamics of every faction. If it doesn't, we stay in a slower-moving but still transformative story."],
   choiceQ:"Does AGI arrive in the next two years?",
   choices:[{v:"no",label:"No",desc:"Current AI is powerful but nothing like AGI"},
            {v:"claimed",label:"Claimed",desc:"A lab claims AGI but experts are sharply divided"},
            {v:"demonstrated",label:"Demonstrated",desc:"A credible AGI-level system is shown publicly"},
            {v:"transformative",label:"Transformative",desc:"True AGI arrives and begins reshaping society"}],
   textQ:"What are the implications in your scenario? What changes first?"},

  {id:"china",icon:"🌏",title:"China and the Race",
   body:["The US and China are in direct competition for AI dominance — economically and militarily. DeepSeek proved China can match American frontier models at a fraction of the cost. The Pentagon says China has narrowed the gap significantly.",
         "How this competition resolves will drive American AI policy more than any domestic political event."],
   choiceQ:"Where does China stand relative to the US by 2027?",
   choices:[{v:"us_leads",label:"US Leads Clearly",desc:"America maintains a decisive advantage"},
            {v:"parity",label:"Rough Parity",desc:"Both powers at similar capability levels"},
            {v:"china_ahead",label:"China Pulls Ahead",desc:"China demonstrates decisive superiority"},
            {v:"confrontation",label:"Direct Confrontation",desc:"AI capabilities trigger a geopolitical crisis"}],
   textQ:"What specifically happens? What do Americans see and feel?"},

  {id:"harm",icon:"⚠️",title:"Something Goes Wrong",
   body:["AI systems are being deployed faster than they are understood. An AI model coached a teenager toward suicide. AI-generated content influenced multiple elections. Military AI was used operationally with lethal consequences.",
         "The question is not whether something goes wrong. It is whether it is dramatic enough and attributable enough to become a genuine turning point in public opinion."],
   choiceQ:"Does a major AI harm event occur?",
   choices:[{v:"none",label:"Nothing Major",desc:"Incidents happen but fade quickly"},
            {v:"minor",label:"Minor Event",desc:"Significant incident, limited lasting impact"},
            {v:"major",label:"Major Event",desc:"A turning point that shifts public opinion"},
            {v:"catastrophic",label:"Catastrophic",desc:"A disaster that changes everything"}],
   textQ:"What happens? Who is harmed and how does the public react?"},

  {id:"copyright",icon:"⚖️",title:"Who Owns the Creative Work?",
   body:["Every major AI was trained on human creative work — books, music, art, journalism — without permission or payment. Over 70 lawsuits are active in American courts right now.",
         "A ruling on whether AI training is fair use is expected in summer 2026. This is the one battlefield where the tech industry's political power doesn't apply. It is up to federal judges."],
   choiceQ:"How does the legal battle resolve?",
   choices:[{v:"ai_wins",label:"AI Wins",desc:"Fair use upheld — AI training stays unrestricted"},
            {v:"partial",label:"Partial",desc:"Some limits set, AI mostly continues"},
            {v:"uncertain",label:"Uncertain",desc:"Split decisions, years of appeals ahead"},
            {v:"creators_win",label:"Creators Win",desc:"Courts rule against AI — licensing required"}],
   textQ:"What does this mean in practice for creators and for AI companies?"},

  {id:"eu",icon:"🇪🇺",title:"Europe Sets the Rules",
   body:["The EU AI Act takes effect in August 2026 with penalties up to 7% of global revenue. Every major American AI company serves European users. Unlike US regulation, this cannot be lobbied away or reversed by executive order.",
         "The question is whether Europe enforces aggressively, and whether US companies comply globally or try to maintain two versions of their products."],
   choiceQ:"How aggressively does Europe enforce?",
   choices:[{v:"symbolic",label:"Largely Symbolic",desc:"Few real penalties, mostly business as usual"},
            {v:"moderate",label:"Moderate",desc:"Some fines, real compliance adjustments"},
            {v:"aggressive",label:"Aggressive",desc:"Major fines, forces significant product changes"},
            {v:"global",label:"Sets Global Standard",desc:"US companies adopt EU rules worldwide"}],
   textQ:"What do American AI companies actually change because of European enforcement?"},

  {id:"election",icon:"🗳️",title:"The 2026 Midterms",
   body:["The November 2026 midterms are the first major test of whether AI is a voting issue. Over 60% of Americans fear AI will eliminate jobs. Grassroots opposition to AI data centers is bipartisan.",
         "Republicans are split between tech-aligned incumbents and populists who have started calling Silicon Valley 'broligarchs.' Democrats need to flip seats to win either chamber."],
   choiceQ:"What happens in November 2026?",
   choices:[{v:"gop_holds",label:"GOP Holds Both",desc:"Status quo, no legislative shift"},
            {v:"dem_gains",label:"Dem Gains",desc:"Democrats gain seats but no majority"},
            {v:"dem_house",label:"Dems Flip House",desc:"Democrats win the House majority"},
            {v:"dem_both",label:"Dems Flip Both",desc:"Democrats take back both chambers"}],
   textQ:"Does AI play a role in the outcome? What issues actually move voters?"},

  {id:"military",icon:"🎖️",title:"AI Goes to War",
   body:["The US military is deploying AI into live operations — targeting, intelligence, logistics. AI was used in the 2026 operation that captured Venezuela's president. The Pentagon split from Anthropic over autonomous lethal targeting decisions.",
         "Does this deployment demonstrate American military dominance, or does something fail in a way the public cannot ignore?"],
   choiceQ:"How does US military AI deployment go?",
   choices:[{v:"dominance",label:"Dominance",desc:"AI demonstrates clear US military superiority"},
            {v:"mixed",label:"Mixed Results",desc:"Some wins and failures, no clear verdict"},
            {v:"failure",label:"Documented Failure",desc:"A significant failure forces a public reckoning"},
            {v:"adversary",label:"Adversary Surprise",desc:"An adversary's AI capability shocks the US"}],
   textQ:"What specifically happens and what does the public learn about it?"},

  {id:"legislation",icon:"📜",title:"Does America Get a Law?",
   body:["Congress has tried and failed to pass AI legislation for three years. The Senate voted 99-1 against the last major attempt. Forty-two states have introduced their own AI bills, creating a contradictory patchwork of rules.",
         "The US is the only major democracy without a national AI law. Whether that changes — and what the law actually does — determines whether any governance exists at all."],
   choiceQ:"Does the US pass federal AI legislation by end of 2027?",
   choices:[{v:"nothing",label:"Nothing Passes",desc:"Inaction continues, states fill the vacuum"},
            {v:"weak",label:"Weak Law",desc:"Industry-friendly, mostly voluntary"},
            {v:"moderate",label:"Moderate Law",desc:"Some real worker and safety protections"},
            {v:"strong",label:"Strong Law",desc:"Real enforcement, meaningful worker protections"}],
   textQ:"What does the law cover, or why does it fail? Who wins and loses?"},
];

// ── PROMPT ───────────────────────────────────────────────────────────────────
function buildPrompt(){
  return [
    "You are the simulation engine for AI Factions: The Simulation.",
    "A player made structured predictions (choice + elaboration) for 9 key events.",
    "Generate the world that exists on January 1, 2028 based on their worldview.",
    "",
    "SCORING: Return final scores on a 1-100 scale (100=thriving, 50=average, 1=dire).",
    "Scores represent overall economic security, employment stability, and income for each group.",
    "",
    "BASELINE SCORES (March 2026, before the AI era resolves):",
    "billionaire:95 | investor:76 | tech_entrepreneur:79 | tech_worker:71",
    "knowledge_worker:67 | creative:44 | tradesperson:62 | service_worker:31",
    "middle_manager:58 | gig_worker:34 | small_business:53 | near_retirement:56",
    "young_worker:41 | union_public:63",
    "",

    "AGI claimed only: modest additional shifts, uncertainty premium",

    "AI wins copyright: creative -8-15 more; tech_entrepreneur +5-10",

    '"groups":[',
    '{"id":"billionaire","score":96,"headline":"5-7 word outcome","note":"One sentence mechanism"},',
    '{"id":"investor","score":77,"headline":"","note":""},',
    '{"id":"tech_entrepreneur","score":81,"headline":"","note":""},',
    '{"id":"tech_worker","score":67,"headline":"","note":""},',
    '{"id":"knowledge_worker","score":59,"headline":"","note":""},',
    '{"id":"creative","score":36,"headline":"","note":""},',
    '{"id":"tradesperson","score":68,"headline":"","note":""},',
    '{"id":"service_worker","score":25,"headline":"","note":""},',
    '{"id":"middle_manager","score":46,"headline":"","note":""},',
    '{"id":"gig_worker","score":27,"headline":"","note":""},',

    '],',
    '"factions":[',
    '{"code":"F1","name":"Accelerationists","outcome":"Win|Partial Win|Draw|Partial Loss|Loss","reason":"One sentence"},',
    '{"code":"F2","name":"AI Safety","outcome":"","reason":""},',
    '{"code":"F3","name":"Open Source Advocates","outcome":"","reason":""},',
    '{"code":"F4","name":"Organized Labor","outcome":"","reason":""},',
    '{"code":"F5","name":"Reskilling Camp","outcome":"","reason":""},',
    '{"code":"F6","name":"Progressives","outcome":"","reason":""},',
    '{"code":"F7","name":"Laissez-Faire Conservatives","outcome":"","reason":""},',
    '{"code":"F8","name":"National Security Hawks","outcome":"","reason":""},',

    "]}"
  ].join("\n");
}

// ── UTILITIES ────────────────────────────────────────────────────────────────
function xj(t){try{return JSON.parse(t)}catch{}const m=t.match(/\{[\s\S]*\}/);if(m){try{return JSON.parse(m[0])}catch{}}return null;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function scoreColor(s){
  if(s>=75)return GRN;
  if(s>=60)return "#6EE7B7";
  if(s>=45)return AMB;
  if(s>=30)return RED;
  return "#EF4444";
}
function deltaColor(d){return d>0?GRN:d<0?RED:MUTED;}
function deltaSign(d){return d>0?"+":"";}

// ── UI PRIMITIVES ────────────────────────────────────────────────────────────
function Div(){return h("div",{style:{height:1,background:BORDER,margin:"22px 0"}});}
function Eye({t}){return h("p",{style:{fontFamily:MO,fontSize:11,letterSpacing:"0.2em",color:MUTED,marginBottom:14,textAlign:"center"}},t);}

function Screen({ch,wide}){
  return h("div",{style:{minHeight:"100vh",background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:wide?"flex-start":"center",padding:wide?"40px 20px":"50px 20px",overflowY:"auto"}},
    h("div",{className:"fade",style:{width:"100%",maxWidth:wide?900:680}},ch)
  );
}

function Btn({label,onClick,disabled,secondary}){
  const [hov,setHov]=useState(false);
  var bg=disabled?"#161E2C":secondary?(hov?"#1A2535":"transparent"):hov?"#DEB85C":GOLD;
  var col=disabled?MUTED:secondary?BODY:"#000";
  var brd=secondary?"1px solid "+BORDER:"none";
  return h("button",{
    onClick:disabled?undefined:onClick,
    onMouseEnter:()=>setHov(true),onMouseLeave:()=>setHov(false),
    style:{background:bg,color:col,border:brd,borderRadius:6,fontWeight:700,fontSize:12,letterSpacing:"0.1em",padding:"12px 26px",opacity:disabled?.5:1,cursor:disabled?"not-allowed":"pointer",transition:"all .15s"}
  },label);
}

// Score bar with before/after comparison
function ScoreBars({base,final,color}){
  const [ready,setReady]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setReady(true),100);return()=>clearTimeout(t);},[]);
  var basePct=(base/100)*100;
  var finalPct=(final/100)*100;
  var dc=deltaColor(final-base);
  return h("div",{style:{marginTop:6}},
    // TODAY bar
    h("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:5}},
      h("span",{style:{fontFamily:MO,fontSize:9,color:MUTED,minWidth:36}},"TODAY"),
      h("div",{style:{flex:1,height:6,background:RAISED,borderRadius:3,overflow:"hidden"}},
        h("div",{style:{height:"100%",width:basePct+"%",background:"#3A4A6A",borderRadius:3}})
      ),
      h("span",{style:{fontFamily:MO,fontSize:11,fontWeight:700,color:MUTED,minWidth:24,textAlign:"right"}},base)
    ),
    // 2028 bar
    h("div",{style:{display:"flex",alignItems:"center",gap:8}},
      h("span",{style:{fontFamily:MO,fontSize:9,color:MUTED,minWidth:36}},"2028"),
      h("div",{style:{flex:1,height:6,background:RAISED,borderRadius:3,overflow:"hidden"}},
        h("div",{
          style:{height:"100%",width:ready?finalPct+"%":"0%",background:color||scoreColor(final),borderRadius:3,transition:"width 1s cubic-bezier(.4,0,.2,1)"}
        })
      ),
      h("span",{style:{fontFamily:MO,fontSize:11,fontWeight:700,color:scoreColor(final),minWidth:24,textAlign:"right"}},final)
    ),
    // Delta
    h("div",{style:{textAlign:"right",marginTop:3}},
      h("span",{style:{fontFamily:MO,fontSize:10,fontWeight:700,color:dc}},
        deltaSign(final-base)+(final-base)+" pts"
      )
    )
  );
}

// Choice button for events
function ChoiceBtn({choice,selected,onClick}){
  const [hov,setHov]=useState(false);
  var active=selected;
  return h("div",{
    onClick:onClick,
    onMouseEnter:()=>setHov(true),onMouseLeave:()=>setHov(false),
    style:{
      background:active?GOLD+"18":hov?"#161E2C":CARD,
      border:"1px solid "+(active?GOLD:hov?MUTED:BORDER),
      borderRadius:8,padding:"12px 16px",cursor:"pointer",transition:"all .15s",
      display:"flex",alignItems:"flex-start",gap:12,marginBottom:8
    }
  },
    h("div",{style:{
      width:18,height:18,borderRadius:"50%",border:"2px solid "+(active?GOLD:BORDER),
      background:active?GOLD:"transparent",flexShrink:0,marginTop:1,
      display:"flex",alignItems:"center",justifyContent:"center"
    }},
      active&&h("div",{style:{width:7,height:7,borderRadius:"50%",background:"#000"}})
    ),
    h("div",{},
      h("p",{style:{fontFamily:MO,fontWeight:700,fontSize:12,color:active?GOLD:TEXT,marginBottom:3}},choice.label),
      h("p",{style:{fontSize:12,color:BODY,lineHeight:1.4}},choice.desc)
    )
  );
}

// ── PHASE SCREENS ─────────────────────────────────────────────────────────────

function IntroScreen({onNext}){
  return Screen({ch:[
    Eye({t:"MARCH 2026"}),
    h("h1",{style:{fontFamily:SF,fontSize:36,fontWeight:400,color:TEXT,textAlign:"center",lineHeight:1.25,marginBottom:36}},"The world is mid-transformation."),
    Div(),
    h("p",{style:{fontFamily:SF,fontSize:16,color:BODY,lineHeight:1.85,marginBottom:18}},"Artificial intelligence has moved from science fiction to the infrastructure of daily life in less than four years. The productivity gains are real. They are flowing almost entirely to the people who own the technology. Entry-level professional jobs — the ones that teach skills, build careers, and anchor households — are disappearing faster than they are being replaced."),
    h("p",{style:{fontFamily:SF,fontSize:16,color:BODY,lineHeight:1.85,marginBottom:18}},"Ten factions are fighting to shape what comes next. Tech billionaires who believe the future belongs to whoever builds fastest. Labor unions writing AI protections into contracts before the window closes. European regulators whose law now has real teeth. Military officials who see AI as the defining edge against China. Artists and musicians fighting for compensation for the work their creations were trained on."),
    h("p",{style:{fontFamily:SF,fontSize:16,color:TEXT,lineHeight:1.85,marginBottom:0}},"Nine events over the next two years will determine what kind of world exists on January 1, 2028. You will predict each one — choose the outcome you think will happen and explain your reasoning. The simulation will build the world your predictions produce."),
    Div(),
    h("div",{style:{textAlign:"center"}},h(Btn,{label:"BEGIN →",onClick:onNext}))
  ]});
}

function ChooseScreen({onNext}){
  const [sel,setSel]=useState(null);
  const grp=GROUPS.find(g=>g.id===sel);
  return Screen({wide:true,ch:[
    h("div",{style:{textAlign:"center",marginBottom:28}},
      Eye({t:"BEFORE WE BEGIN"}),
      h("h2",{style:{fontFamily:SF,fontSize:28,fontWeight:400,color:TEXT,marginBottom:10}},"Who are you in this story?"),
      h("p",{style:{fontFamily:SF,fontSize:14,color:BODY,maxWidth:500,margin:"0 auto"}},"Pick the group you identify with or care most about. Your outcome will be revealed first. Scores show how each group is faring in society today (1-100).")
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:8,marginBottom:24}},
      ...GROUPS.map(function(g){
        var active=sel===g.id;
        var base=BASE[g.id];
        var bcolor=scoreColor(base);
        return h("div",{key:g.id,onClick:()=>setSel(g.id),
          onMouseEnter:function(e){if(!active)e.currentTarget.style.borderColor=g.color+"77";},
          onMouseLeave:function(e){if(!active)e.currentTarget.style.borderColor=BORDER;},
          style:{background:active?g.color+"15":CARD,border:"1px solid "+(active?g.color:BORDER),borderRadius:8,padding:"12px 14px",cursor:"pointer",transition:"all .15s"}},
          h("p",{style:{fontFamily:MO,fontWeight:700,fontSize:11,color:g.color,marginBottom:4}},g.name),
          h("p",{style:{fontSize:11,color:MUTED,lineHeight:1.4,marginBottom:8}},g.desc),
          h("div",{style:{display:"flex",alignItems:"center",gap:6}},
            h("div",{style:{flex:1,height:4,background:RAISED,borderRadius:2,overflow:"hidden"}},

    h("div",{style:{marginBottom:28}},

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [phase,setPhase]=useState("intro");
  const [history,setHistory]=useState([]);
  const [chosenId,setChosenId]=useState(null);
  const [responses,setResponses]=useState(Array(EVENTS.length).fill(null));
  const [evIdx,setEvIdx]=useState(0);
  const [result,setResult]=useState(null);
  const [error,setError]=useState(null);

  function goTo(next){setHistory(function(h){return [...h,phase];});setPhase(next);}
  function goBack(){
    if(history.length===0)return;
    var prev=history[history.length-1];
    setHistory(function(h){return h.slice(0,-1);});
    setPhase(prev);
  }

  function answer(idx,data){
    setResponses(function(prev){var n=[...prev];n[idx]=data;return n;});
  }
  function nextEvent(){
    if(evIdx<EVENTS.length-1){setEvIdx(function(i){return i+1;});}
    else{setPhase("processing");simulate();}
  }
  function prevEvent(){
    if(evIdx>0){setEvIdx(function(i){return i-1;});}
    else{goBack();}
  }
  async function simulate(){
    setError(null);
    var grp=GROUPS.find(function(g){return g.id===chosenId;})||GROUPS[0];
    var lines=["Player group: "+grp.name+" — "+grp.desc,""];
    EVENTS.forEach(function(ev,i){
      var r=responses[i]||{};
      var cobj=ev.choices.find(function(c){return c.v===r.choice;});
      lines.push("EVENT "+(i+1)+" "+ev.title.toUpperCase()+":");
      lines.push("Choice: "+(cobj?cobj.label+" ("+cobj.desc+")":"not answered"));
      if(r.text)lines.push("Player elaboration: "+r.text);
      lines.push("");
    });
    lines.push("Return only the JSON object.");
    var msg=lines.join("\n");
    try{
      var res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:3000,system:buildPrompt(),messages:[{role:"user",content:msg}]})
      });
      var data=await res.json();
      var parsed=xj(data.content?.[0]?.text||"");
      if(!parsed)throw new Error("Could not parse simulation output. Please try again.");
      setResult(parsed);setHistory([]);setPhase("union");
    }catch(e){setError(e.message||"Simulation failed.");setPhase("error");}
  }
  function replay(){setPhase("intro");setHistory([]);setChosenId(null);setResponses(Array(EVENTS.length).fill(null));setEvIdx(0);setResult(null);setError(null);}

  if(phase==="intro")      return h(IntroScreen,{onNext:function(){goTo("choose");}});
  if(phase==="choose")     return h(ChooseScreen,{onNext:function(id){setChosenId(id);goTo("events");},onBack:goBack});
  if(phase==="events")     return h(EventScreen,{idx:evIdx,responses,onAnswer:answer,onNext:nextEvent,onBack:prevEvent});
  if(phase==="processing") return h(ProcessingScreen,null);
  if(phase==="error")      return h(ErrScreen,{error,onRetry:function(){setPhase("processing");simulate();}});
  if(phase==="union")      return h(UnionScreen,{result,onNext:function(){goTo("group");}});
  if(phase==="group")      return h(GroupScreen,{result,chosenId,onNext:function(){goTo("all");},onBack:goBack});
  if(phase==="all")        return h(AllGroupsScreen,{result,chosenId,onNext:function(){goTo("factions");},onBack:goBack});
  if(phase==="factions")   return h(FactionsScreen,{result,responses,chosenId,onReplay:replay,onBack:goBack});
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
